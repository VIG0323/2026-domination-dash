  <script>
    // Show install banner on iOS Safari (not in standalone mode)
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const isStandalone = window.navigator.standalone === true;
    const dismissed = localStorage.getItem('pwaInstallDismissed');
    
    if (isIOS && !isStandalone && !dismissed) {
      setTimeout(() => {
        document.getElementById('pwaInstallBanner').classList.add('show');
      }, 3000);
    }
    
    // Register Service Worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Create inline service worker
        const swCode = `
          const CACHE_NAME = 'domination-2026-v1';
          const urlsToCache = ['/'];
          
          self.addEventListener('install', (event) => {
            event.waitUntil(
              caches.open(CACHE_NAME).then((cache) => cache.addAll(urlsToCache))
            );
            self.skipWaiting();
          });
          
          self.addEventListener('fetch', (event) => {
            event.respondWith(
              caches.match(event.request).then((response) => {
                return response || fetch(event.request).catch(() => caches.match('/'));
              })
            );
          });
        `;
        
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        
        navigator.serviceWorker.register(swUrl).then((registration) => {
          console.log('PWA: Service Worker registered');
        }).catch((err) => {
          console.log('PWA: Service Worker registration failed (normal for local dev)');
        });
      });
    }
  </script>
  

  <script>

  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [activeView, setActiveView] = useState('command');
      const [activeCategory, setActiveCategory] = useState('all');
      const [showCelebration, setShowCelebration] = useState(false);
      const [celebrationMsg, setCelebrationMsg] = useState('');
      
      // Simple localStorage load/save
      const load = (key, def) => { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch(e) { return def; } };
      const save = (key, val) => { localStorage.setItem(key, JSON.stringify(val)); };

      // Date helpers
      const getDaysRemaining = () => Math.max(0, Math.ceil((new Date('2026-12-31') - new Date()) / 86400000));
      const getDaysElapsed = () => Math.max(0, Math.ceil((new Date() - new Date('2026-01-01')) / 86400000));
      const getWeekNumber = () => {
        // Week 1 starts Monday Dec 29, 2025
        // On Sundays, show the NEXT week (since you plan on Sundays for the week ahead)
        const week1Start = new Date(2025, 11, 29); // Dec 29, 2025
        const now = new Date();
        const dayOfWeek = now.getDay(); // 0 = Sunday
        const diffDays = Math.floor((now - week1Start) / 86400000);
        let weekNum = Math.floor(diffDays / 7) + 1;
        // If it's Sunday, show next week for planning
        if (dayOfWeek === 0) {
          weekNum += 1;
        }
        return Math.max(1, weekNum);
      };
      
      // For Weekly Audit - on Sundays, show the week that just ENDED (not the upcoming week)
      const getAuditWeekNumber = () => {
        const week1Start = new Date(2025, 11, 29); // Dec 29, 2025
        const now = new Date();
        const diffDays = Math.floor((now - week1Start) / 86400000);
        let weekNum = Math.floor(diffDays / 7) + 1;
        // Do NOT add 1 on Sundays - we want to audit the week that just ended
        return Math.max(1, weekNum);
      };
      const getQuarter = () => ['Q1','Q2','Q3','Q4'][Math.floor(new Date().getMonth() / 3)];
      const getMonthName = () => new Date().toLocaleDateString('en-US', { month: 'long' });
      const getTodayKey = () => new Date().toISOString().split('T')[0];
      const getYearProgress = () => Math.round((getDaysElapsed() / 365) * 100);

      // Goals definition
      const defGoals = {
        income2026: { current: 0, target: 150000, unit: '$', label: '2026 Income', category: 'career', milestones: { Q1: 37500, Q2: 75000, Q3: 112500, Q4: 150000 } },
        properties: { current: 0, target: 3, label: 'VIG Properties', category: 'career', milestones: { Q1: 1, Q2: 2, Q3: 2, Q4: 3 } },
        savings: { current: 0, target: 10000, unit: '$', label: 'Marriage Savings', category: 'career', milestones: { Q1: 2500, Q2: 5000, Q3: 7500, Q4: 10000 } },
        financeMeetings: { current: 0, target: 12, label: 'Finance Meetings', category: 'career', milestones: { Q1: 3, Q2: 6, Q3: 9, Q4: 12 } },
        burpees: { current: 0, target: 3000, label: 'Burpees', category: 'health', milestones: { Q1: 750, Q2: 1500, Q3: 2250, Q4: 3000 } },
        bodyFat: { current: 15, target: 11, unit: '%', label: 'Body Fat', category: 'health', inverse: true, milestones: { Q1: 14, Q2: 13, Q3: 12, Q4: 11 } },
        weight: { current: 185, target: 177, unit: 'lbs', label: 'Weight', category: 'health', inverse: true, milestones: { Q1: 182, Q2: 180, Q3: 178, Q4: 177 } },
        workouts: { current: 0, target: 280, label: 'Workouts', category: 'health', milestones: { Q1: 70, Q2: 140, Q3: 210, Q4: 280 } },
        booksRead: { current: 0, target: 15, label: 'Books Read', category: 'leadership', milestones: { Q1: 4, Q2: 8, Q3: 11, Q4: 15 } },
        podcastAppearances: { current: 0, target: 1, label: 'Podcast', category: 'leadership' },
        menMentored: { current: 0, target: 10, label: 'Men Mentored', category: 'leadership' },
        newExperiences: { current: 0, target: 6, label: 'New Experiences', category: 'adventure' },
        weekendGetaways: { current: 0, target: 4, label: 'Getaways', category: 'adventure' },
      };

      // Motivational quotes
      const quotes = [
        { text: "What gets measured gets managed.", author: "Peter Drucker" },
        { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
        { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
        { text: "The harder you work, the luckier you get.", author: "Gary Player" },
        { text: "Don't wish it were easier. Wish you were better.", author: "Jim Rohn" },
        { text: "Every morning you have two choices: continue to sleep with your dreams, or wake up and chase them.", author: "Carmelo Anthony" },
        { text: "Be willing to FAIL and look dumb. Because everyone will be dead in 100 years.", author: "Your Mantra" },
        { text: "The man who moves a mountain begins by carrying away small stones.", author: "Confucius" },
        { text: "Discipline is choosing between what you want now and what you want most.", author: "Abraham Lincoln" },
        { text: "You don't have to be great to start, but you have to start to be great.", author: "Zig Ziglar" },
        { text: "Make certain you have no regrets when you die.", author: "Your Mantra" },
        { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
      ];

      // State
      const [goals, setGoals] = useState(() => {
        const saved = load('goals2026', null);
        if (!saved) return defGoals;
        // Merge saved data with default labels and properties
        const merged = {};
        Object.keys(defGoals).forEach(k => {
          merged[k] = { ...defGoals[k], ...saved[k], label: defGoals[k].label, category: defGoals[k].category };
        });
        return merged;
      });
      const [dailyLogs, setDailyLogs] = useState(() => load('dailyLogs2026', {}));
      const [wins, setWins] = useState(() => load('wins2026', []));
      const [streaks, setStreaks] = useState(() => load('streaks2026', { workout: 0, protein: 0, sleep: 0, reading: 0, bestWorkout: 0, bestProtein: 0, valueDomains: 0, bestValueDomains: 0 }));
      const [points, setPoints] = useState(() => load('points2026', 0));
      const [level, setLevel] = useState(() => load('level2026', 1));
      const [badges, setBadges] = useState(() => load('badges2026', []));
      const [weeklyReviews, setWeeklyReviews] = useState(() => load('weeklyReviews2026', {}));
      const [focusGoals, setFocusGoals] = useState(() => load('focusGoals2026', ['workouts', 'burpees', 'income2026']));
      const [gratitude, setGratitude] = useState(() => load('gratitude2026', []));
      
      // 6 Value Domains state - uses viewing date
      const getDefaultValueDomains = (date) => ({
        date: date,
        domains: {
          faith: false,
          family: false,
          fitness: false,
          financial: false,
          leadership: false,
          adventure: false
        },
        submitted: false
      });
      
      // Viewing Date — declared early because valueDomains useEffects depend on it
      const [viewingDate, setViewingDate] = useState(getTodayKey());

      const [valueDomains, setValueDomains] = useState(() => {
        const saved = load(`valueDomains2026_${getTodayKey()}`, null);
        if (saved) return saved;
        return getDefaultValueDomains(getTodayKey());
      });
      
      // Reload value domains when viewing date changes
      const valueDomainDateLoaded = React.useRef(getTodayKey());
      useEffect(() => {
        valueDomainDateLoaded.current = viewingDate;
        const saved = load(`valueDomains2026_${viewingDate}`, null);
        if (saved) {
          setValueDomains(saved);
        } else {
          setValueDomains(getDefaultValueDomains(viewingDate));
        }
      }, [viewingDate]);
      
      // Save value domains — only save when date matches loaded date (prevents overwriting on date switch)
      useEffect(() => { 
        if (valueDomainDateLoaded.current === viewingDate) {
          save(`valueDomains2026_${viewingDate}`, valueDomains);
        }
      }, [valueDomains, viewingDate]);
      
      // Toggle domain
      const toggleDomain = (domain) => {
        if (valueDomains.submitted) return;
        setValueDomains(prev => ({
          ...prev,
          domains: { ...prev.domains, [domain]: !prev.domains[domain] }
        }));
      };
      
      // Submit value domains
      const submitValueDomains = () => {
        if (valueDomains.submitted) return;
        
        const allComplete = Object.values(valueDomains.domains).every(v => v);
        const completedCount = Object.values(valueDomains.domains).filter(v => v).length;
        
        // Update streaks
        if (allComplete) {
          setStreaks(prev => {
            const newStreak = prev.valueDomains + 1;
            return {
              ...prev,
              valueDomains: newStreak,
              bestValueDomains: Math.max(prev.bestValueDomains, newStreak)
            };
          });
          addPoints(100, '6 Value Domains complete');
          celebrate(`🔥 ALL 6 VALUE DOMAINS COMPLETE! Streak: ${streaks.valueDomains + 1} days! +100 pts!`);
        } else {
          setStreaks(prev => ({ ...prev, valueDomains: 0 }));
          addPoints(completedCount * 10, 'Value Domains partial');
          celebrate(`✓ ${completedCount}/6 Value Domains logged. +${completedCount * 10} pts. Streak reset.`);
        }
        
        setValueDomains(prev => ({ ...prev, submitted: true }));
      };
      
      // Get current quarter
      const getCurrentQuarter = () => {
        const month = new Date().getMonth();
        if (month < 3) return 'Q1';
        if (month < 6) return 'Q2';
        if (month < 9) return 'Q3';
        return 'Q4';
      };
      
      // Get quarterly target for a goal
      const getQuarterlyTarget = (goal) => {
        const q = getCurrentQuarter();
        if (goal.milestones && goal.milestones[q]) {
          return goal.milestones[q];
        }
        // Default: divide annual target by 4
        return Math.ceil(goal.target / 4);
      };
      
      // Get quarterly progress status
      const getQuarterlyStatus = (goalKey, goal) => {
        const q = getCurrentQuarter();
        const qNum = parseInt(q.replace('Q', ''));
        const weeksInQuarter = 13;
        const currentWeek = getWeekNumber();
        const weekInQuarter = currentWeek - ((qNum - 1) * 13);
        const quarterProgress = weekInQuarter / weeksInQuarter;
        
        const qTarget = getQuarterlyTarget(goal);
        const expectedProgress = qTarget * quarterProgress;
        
        if (goal.inverse) {
          const startVal = qNum === 1 ? 15 : goal.milestones[`Q${qNum-1}`];
          const expectedDrop = startVal - ((startVal - qTarget) * quarterProgress);
          return goal.current <= expectedDrop ? 'on-pace' : 'behind';
        }
        
        // For cumulative goals, calculate what should be done by now this quarter
        const qStart = qNum === 1 ? 0 : (goal.milestones ? goal.milestones[`Q${qNum-1}`] : goal.target * (qNum-1) / 4);
        const expectedNow = qStart + (qTarget - qStart) * quarterProgress;
        
        if (goal.current >= expectedNow * 0.95) return 'on-pace';
        if (goal.current >= expectedNow * 0.8) return 'slightly-behind';
        return 'behind';
      };
      
      // Goals that need attention (behind quarterly pace)
      const getGoalsNeedingAttention = () => {
        return Object.entries(goals).filter(([key, goal]) => {
          if (!goal.milestones) return false;
          const status = getQuarterlyStatus(key, goal);
          return status === 'behind' || status === 'slightly-behind';
        }).map(([key, goal]) => ({
          key,
          ...goal,
          status: getQuarterlyStatus(key, goal),
          qTarget: getQuarterlyTarget(goal)
        }));
      };
      
      // Weekly Plan state
      const weeklyPlanKey = `weekPlan-${getWeekNumber()}`;
      const prevWeekKey = `weekPlan-${getWeekNumber() - 1}`;
      
      const defaultWeeklyPlan = {
        week: getWeekNumber(),
        domains: {
          faith: { quarterlyFocus: '', weeklyGoals: [] },
          family: { quarterlyFocus: '', weeklyGoals: [] },
          fitness: { quarterlyFocus: '', weeklyGoals: [] },
          financial: { quarterlyFocus: '', weeklyGoals: [] },
          leadership: { quarterlyFocus: '', weeklyGoals: [] },
          adventure: { quarterlyFocus: '', weeklyGoals: [] }
        },
        carriedOver: [],
        lastWeekCompletion: 0,
        submitted: false
      };
      
      // Helper function to reset goals/tasks for new week (uncheck everything)
      const resetGoalsForNewWeek = (domains) => {
        if (!domains || typeof domains !== 'object' || Array.isArray(domains)) return {};
        const resetDomains = {};
        try {
          Object.entries(domains).forEach(([key, domain]) => {
            if (!domain || typeof domain !== 'object') return;
            resetDomains[key] = {
              ...domain,
              weeklyGoals: Array.isArray(domain.weeklyGoals) ? domain.weeklyGoals.map(goal => ({
                ...goal,
                id: Date.now() + Math.random(),
                completed: false,
                subTasks: Array.isArray(goal.subTasks) ? goal.subTasks.map(task => ({
                  ...task,
                  id: Date.now() + Math.random(),
                  completed: false
                })) : []
              })) : []
            };
          });
        } catch(e) { console.error('resetGoalsForNewWeek error:', e); }
        return resetDomains;
      };
      
      const [weeklyPlan, setWeeklyPlan] = useState(() => {
        try {
        const rawSaved = load('weeklyPlans2026', {});
        const saved = (rawSaved && typeof rawSaved === 'object' && !Array.isArray(rawSaved)) ? rawSaved : {};
        const existing = saved[weeklyPlanKey];
        
        // Helper to check if a plan has actual goals
        const hasGoals = (plan) => {
          if (!plan || !plan.domains) return false;
          return Object.values(plan.domains).some(domain => 
            domain.weeklyGoals && domain.weeklyGoals.length > 0
          );
        };
        
        // If this week's plan already exists AND has goals, use it
        if (existing && existing.domains && hasGoals(existing)) {
          return {
            ...defaultWeeklyPlan,
            ...existing,
            domains: {
              faith: existing.domains?.faith || defaultWeeklyPlan.domains.faith,
              family: existing.domains?.family || defaultWeeklyPlan.domains.family,
              fitness: existing.domains?.fitness || defaultWeeklyPlan.domains.fitness,
              financial: existing.domains?.financial || defaultWeeklyPlan.domains.financial,
              leadership: existing.domains?.leadership || defaultWeeklyPlan.domains.leadership,
              adventure: existing.domains?.adventure || defaultWeeklyPlan.domains.adventure
            }
          };
        }
        
        // No existing plan with goals - check if previous week exists and has submitted goals
        const prevWeek = saved[prevWeekKey];
        if (prevWeek && prevWeek.domains && prevWeek.submitted && hasGoals(prevWeek)) {
          // Carry over goals from previous week with checkboxes reset
          const carriedDomains = resetGoalsForNewWeek(prevWeek.domains);
          return {
            ...defaultWeeklyPlan,
            domains: carriedDomains,
            carriedFromWeek: getWeekNumber() - 1
          };
        }
        
        // No previous week data, use blank default
        return defaultWeeklyPlan;
        } catch(e) { console.error('weeklyPlan load error:', e); return defaultWeeklyPlan; }
      });
      
      // Persistent Quarterly Focus (persists across all weeks)
      const [quarterlyFocus, setQuarterlyFocus] = useState(() => load('quarterlyFocus2026', {
        faith: '',
        family: '',
        fitness: '',
        financial: '',
        leadership: '',
        adventure: ''
      }));
      
      // Save quarterly focus when it changes
      useEffect(() => { save('quarterlyFocus2026', quarterlyFocus); }, [quarterlyFocus]);
      
      // Update quarterly focus for a domain
      const updateQuarterlyFocus = (domainKey, focus) => {
        setQuarterlyFocus(prev => ({ ...prev, [domainKey]: focus }));
      };
      
      // Domain definitions with auto-goals mapping
      const domainDefinitions = {
        faith: {

                      <div style={{ textAlign: 'center', padding: 16, background: 'rgba(78,205,196,0.1)', borderRadius: 8, border: '1px solid rgba(78,205,196,0.3)' }}>
                        <div style={{ fontSize: 24, marginBottom: 8 }}>✅</div>
                        <div style={{ color: '#4ECDC4', fontWeight: 600 }}>Review Submitted!</div>
                        <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginTop: 4 }}>Come back next week for Week {getWeekNumber() + 1}</div>
                      </div>
                    )}
                  </div>
                </div>

                {/* Past Reviews */}
                {Object.keys(weeklyReviews).filter(k => k !== auditWeekKey && weeklyReviews[k].submitted).length > 0 && (
                  <div style={{ ...cardBase, marginTop: 24 }}>
                    <h3 style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, letterSpacing: 2, marginBottom: 20, color: '#FFD700' }}>📜 PAST REVIEWS</h3>
                    <div style={{ display: 'grid', gap: 12 }}>
                      {Object.entries(weeklyReviews)
                        .filter(([k, v]) => k !== auditWeekKey && v.submitted)
                        .sort((a, b) => b[0].localeCompare(a[0]))
                        .slice(0, 5)
                        .map(([weekKey, review]) => (
                          <div key={weekKey} style={{ padding: 16, background: 'rgba(0,0,0,0.3)', borderRadius: 8, border: '1px solid rgba(255,255,255,0.05)' }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                              <span style={{ fontWeight: 600, color: '#9B59B6' }}>{weekKey.replace('week-', 'Week ')}</span>
                              <div style={{ display: 'flex', gap: 12 }}>
                                <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)' }}>Rating: <span style={{ color: '#FFD700' }}>{review.weekRating}/10</span></span>
                                <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)' }}>Energy: <span style={{ color: '#4ECDC4' }}>{review.energyRating}/10</span></span>
                              </div>
                            </div>
                            {review.wins && <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 4 }}>🏆 {review.wins.substring(0, 100)}{review.wins.length > 100 ? '...' : ''}</div>}
                            {review.lessons && <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)' }}>💡 {review.lessons.substring(0, 100)}{review.lessons.length > 100 ? '...' : ''}</div>}
                          </div>
                        ))}
                    </div>
                  </div>
                )}
              </>
            )}

            {/* REWARDS VIEW */}
            {activeView === 'rewards' && (
              <>
                {/* Header */}
                <div style={{ ...cardBase, marginBottom: 24, textAlign: 'center', background: 'linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,107,53,0.05))', borderColor: 'rgba(255,215,0,0.3)' }}>
                  <div style={{ fontSize: 48, marginBottom: 8 }}>🎁</div>
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: 4, color: '#FFD700' }}>2026 REWARDS</div>
                  <p style={{ fontSize: 13, color: 'rgba(255,255,255,0.5)', marginTop: 8 }}>Unlock rewards by hitting your goals. You've earned this.</p>
                  <div style={{ marginTop: 16, display: 'flex', justifyContent: 'center', gap: 24 }}>
                    <div>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, color: '#4ECDC4' }}>{rewards.filter(r => getRewardProgress(r).percent === 100).length}</div>
                      <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)' }}>UNLOCKED</div>
                    </div>
                    <div>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, color: '#FFD700' }}>{rewards.filter(r => getRewardProgress(r).percent > 0 && getRewardProgress(r).percent < 100).length}</div>
                      <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)' }}>IN PROGRESS</div>
                    </div>
                    <div>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 28, color: 'rgba(255,255,255,0.3)' }}>{rewards.filter(r => getRewardProgress(r).percent === 0).length}</div>
                      <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)' }}>LOCKED</div>
                    </div>
                  </div>
                </div>

                {/* All Rewards */}
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: 20 }}>
                  {rewards.map((reward) => {
                    const prog = getRewardProgress(reward);
                    const isUnlocked = prog.percent === 100;
                    return (
                      <div key={reward.id} style={{ ...cardBase, background: isUnlocked ? 'linear-gradient(135deg, rgba(78,205,196,0.15), rgba(78,205,196,0.05))' : 'linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02))', borderColor: isUnlocked ? 'rgba(78,205,196,0.5)' : 'rgba(255,255,255,0.1)', position: 'relative', overflow: 'hidden' }}>
                        {isUnlocked && (
                          <div style={{ position: 'absolute', top: 12, right: 12, background: '#4ECDC4', color: '#000', padding: '4px 12px', borderRadius: 4, fontSize: 10, fontWeight: 700, letterSpacing: 1 }}>✓ UNLOCKED</div>
                        )}
                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16, marginBottom: 16 }}>
                          <div style={{ fontSize: 40, filter: isUnlocked ? 'none' : 'grayscale(50%)' }}>{reward.icon}</div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, letterSpacing: 2, color: isUnlocked ? '#4ECDC4' : '#FFD700', marginBottom: 4 }}>{reward.name}</div>
                            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)' }}>{reward.description}</div>
                            <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.3)', marginTop: 4 }}>Deadline: {reward.deadline}</div>
                          </div>
                        </div>

                        {/* Progress bar */}
                        <div style={{ marginBottom: 16 }}>
                          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                            <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.4)' }}>PROGRESS</span>
                            <span style={{ fontSize: 12, fontFamily: 'monospace', color: isUnlocked ? '#4ECDC4' : '#FFD700', fontWeight: 700 }}>{prog.percent}%</span>
                          </div>
                          <div style={{ height: 8, background: 'rgba(255,255,255,0.1)', borderRadius: 4, overflow: 'hidden' }}>
                            <div style={{ height: '100%', width: `${prog.percent}%`, background: isUnlocked ? '#4ECDC4' : 'linear-gradient(90deg, #FFD700, #FF6B35)', borderRadius: 4, transition: 'width 0.5s' }} />
                          </div>
                        </div>

                        {/* Requirements */}
                        <div>
                          <div style={{ fontSize: 10, letterSpacing: 1, color: 'rgba(255,255,255,0.4)', marginBottom: 10 }}>REQUIREMENTS ({prog.completed}/{prog.total})</div>
                          {reward.requirements.map((req, i) => {
                            const done = req.check(goals);
                            const isMisogi = req.isMisogi;
                            return (
                              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', background: isMisogi ? (done ? 'rgba(255,215,0,0.15)' : 'rgba(255,215,0,0.08)') : (done ? 'rgba(78,205,196,0.1)' : 'rgba(0,0,0,0.3)'), border: `1px solid ${isMisogi ? 'rgba(255,215,0,0.4)' : (done ? 'rgba(78,205,196,0.3)' : 'rgba(255,255,255,0.05)')}`, borderRadius: 6, marginBottom: 8 }}>
                                <div style={{ width: 20, height: 20, borderRadius: '50%', border: `2px solid ${done ? (isMisogi ? '#FFD700' : '#4ECDC4') : 'rgba(255,255,255,0.2)'}`, background: done ? (isMisogi ? '#FFD700' : '#4ECDC4') : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, color: '#000', fontWeight: 'bold' }}>{done ? '✓' : ''}</div>
                                <span style={{ fontSize: 12, color: done ? (isMisogi ? '#FFD700' : '#4ECDC4') : (isMisogi ? '#FFD700' : 'rgba(255,255,255,0.6)'), fontWeight: isMisogi ? 700 : 400 }}>{req.label}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {/* STATS VIEW */}
            {activeView === 'stats' && (
              <>
                {/* Level & Points */}
                <div style={{ ...cardBase, marginBottom: 24, textAlign: 'center' }}>
                  <div style={{ fontSize: 48, marginBottom: 8 }}>⭐</div>
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 48, color: '#FFD700' }}>LEVEL {level}</div>
                  <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.5)', marginBottom: 16 }}>{fmt(points)} Total Points</div>
                  <div style={{ height: 8, background: 'rgba(255,255,255,0.1)', borderRadius: 4, overflow: 'hidden', maxWidth: 300, margin: '0 auto' }}>
                    <div style={{ height: '100%', width: `${(points % 500) / 5}%`, background: 'linear-gradient(90deg, #FFD700, #FF6B35)', borderRadius: 4 }} />
                  </div>
                  <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginTop: 8 }}>{500 - (points % 500)} pts to Level {level + 1}</div>
                </div>

                {/* All-time stats */}
                <div style={grid}>
                  <div style={cardBase}>
                    <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>🔥 STREAK RECORDS</h3>
                    <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', lineHeight: 2 }}>
                      <div>Best Workout Streak: <span style={{ color: '#FFD700', fontWeight: 700 }}>{streaks.bestWorkout} days</span></div>
                      <div>Best Protein Streak: <span style={{ color: '#FFD700', fontWeight: 700 }}>{streaks.bestProtein} days</span></div>
                      <div>Total Wins Logged: <span style={{ color: '#FFD700', fontWeight: 700 }}>{wins.length}</span></div>
                      <div>Days Logged: <span style={{ color: '#FFD700', fontWeight: 700 }}>{Object.keys(dailyLogs).length}</span></div>
                    </div>
                  </div>

                  <div style={cardBase}>
                    <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>🏅 BADGES ({badges.length}/5)</h3>
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', lineHeight: 2 }}>
                      <div style={{ opacity: badges.includes('week-warrior') ? 1 : 0.3 }}>🏅 Week Warrior — 7 day workout streak</div>
                      <div style={{ opacity: badges.includes('iron-discipline') ? 1 : 0.3 }}>🔥 Iron Discipline — 30 day workout streak</div>
                      <div style={{ opacity: badges.includes('burpee-beast') ? 1 : 0.3 }}>💪 Burpee Beast — 1,000 burpees</div>
                      <div style={{ opacity: badges.includes('bookworm') ? 1 : 0.3 }}>📚 Bookworm — 5 books read</div>
                      <div style={{ opacity: badges.includes('thousand-club') ? 1 : 0.3 }}>⭐ Thousand Club — 1,000 points</div>
                    </div>
                  </div>

                  <div style={cardBase}>
                    <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 16 }}>📊 GOAL SUMMARY</h3>
                    <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', lineHeight: 2 }}>
                      {Object.entries(goals).map(([k, g]) => {
                        const p = Math.round(calc(g.current, g.target, g.inverse));
                        return <div key={k}>{g.label}: <span style={{ color: p >= 100 ? '#4ECDC4' : p >= 50 ? '#FFD700' : '#FF6B35', fontWeight: 600 }}>{p}%</span></div>;
                      })}
                    </div>
                  </div>
                </div>

                {/* Calendar Heat Map */}
                <div style={{ ...cardBase, marginTop: 24 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 8 }}>📅 2026 CONSISTENCY CALENDAR</h3>
                  <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 16 }}>Each square = 1 day. Green = logged, Gray = missed, Dark = future</p>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 3 }}>
                    {Array.from({ length: 365 }, (_, i) => {
                      const date = new Date('2026-01-01');
                      date.setDate(date.getDate() + i);
                      const dateKey = date.toISOString().split('T')[0];
                      const isLogged = dailyLogs[dateKey];
                      const isPast = date < new Date();
                      const isToday = dateKey === getTodayKey();
                      
                      return (
                        <div 
                          key={i}
                          title={`${dateKey}${isLogged ? ' ✓ Logged' : isPast ? ' ✗ Missed' : ''}`}
                          style={{ 
                            width: 12, 
                            height: 12, 
                            borderRadius: 2,
                            background: isToday ? '#FFD700' : isLogged ? '#4ECDC4' : isPast ? 'rgba(255,107,53,0.3)' : 'rgba(255,255,255,0.1)',
                            border: isToday ? '1px solid #FFD700' : 'none',
                            cursor: 'default'
                          }}
                        />
                      );
                    })}
                  </div>
                  <div style={{ display: 'flex', gap: 16, marginTop: 12, fontSize: 10, color: 'rgba(255,255,255,0.5)' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><div style={{ width: 10, height: 10, background: '#4ECDC4', borderRadius: 2 }} /> Logged</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><div style={{ width: 10, height: 10, background: 'rgba(255,107,53,0.3)', borderRadius: 2 }} /> Missed</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><div style={{ width: 10, height: 10, background: '#FFD700', borderRadius: 2 }} /> Today</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><div style={{ width: 10, height: 10, background: 'rgba(255,255,255,0.1)', borderRadius: 2 }} /> Future</div>
                  </div>
                </div>

                {/* Export/Backup Data */}
                <div style={{ ...cardBase, marginTop: 24 }}>
                  <h3 style={{ fontSize: 14, fontWeight: 600, marginBottom: 8 }}>💾 BACKUP YOUR DATA</h3>
                  <p style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 16 }}>Download your progress to protect against data loss. Import to restore.</p>
                  
                  <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                    <button 
                      onClick={() => {
                        // Collect ALL localStorage keys for comprehensive backup
                        const backupData = {};
                        const keysToBackup = [];
                        
                        for (let i = 0; i < localStorage.length; i++) {
                          const key = localStorage.key(i);
                          if (key && (key.includes('2026') || key.includes('goals') || key.includes('daily') || key.includes('weekly') || key.includes('morning') || key.includes('evening') || key.includes('power') || key.includes('routine') || key.includes('focus') || key.includes('vig') || key.includes('heloc') || key.includes('streak') || key.includes('points') || key.includes('level') || key.includes('badge') || key.includes('wins') || key.includes('gratitude') || key.includes('books') || key.includes('adventure') || key.includes('listings') || key.includes('time') || key.includes('todo') || key.includes('revenue') || key.includes('checklist') || key.includes('learning') || key.includes('value') || key.includes('quarter') || key.includes('homes') || key.includes('bonus') || key.includes('of'))) {
                            keysToBackup.push(key);
                          }
                        }
                        
                        keysToBackup.forEach(key => {
                          try {
                            backupData[key] = JSON.parse(localStorage.getItem(key));
                          } catch(e) {
                            backupData[key] = localStorage.getItem(key);
                          }
                        });
                        
                        backupData._backupMeta = {
                          createdAt: new Date().toISOString(),
                          version: '2026-domination-dashboard-v2',
                          totalKeys: keysToBackup.length
                        };
                        
                        const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `2026-domination-backup-${getTodayKey()}.json`;
                        a.click();
                        URL.revokeObjectURL(url);
                        celebrate(`💾 Backup Downloaded! ${keysToBackup.length} items saved.`);
                      }}
                      style={btnPrimary}
                    >
                      ⬇️ DOWNLOAD BACKUP
                    </button>
                    
                    <label style={{ ...btnPrimary, background: 'rgba(255,255,255,0.1)', color: '#fff', cursor: 'pointer' }}>
                      ⬆️ IMPORT BACKUP
                      <input 
                        type="file" 
                        accept=".json"
                        style={{ display: 'none' }}
                        onChange={(e) => {
                          const file = e.target.files[0];
                          if (file) {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                              try {
                                const data = JSON.parse(event.target.result);
                                
                                // Check if it's the new comprehensive format
                                if (data._backupMeta) {
                                  const keyCount = Object.keys(data).length - 1;
                                  if (!confirm(`Restore ${keyCount} items from backup created on ${data._backupMeta.createdAt.split('T')[0]}?\n\nThis will OVERWRITE your current data.`)) {
                                    return;
                                  }
                                  
                                  Object.entries(data).forEach(([key, value]) => {
                                    if (key !== '_backupMeta') {
                                      localStorage.setItem(key, JSON.stringify(value));
                                    }
                                  });
                                  
                                  celebrate('✅ Backup Restored! Refreshing...');
                                  setTimeout(() => window.location.reload(), 1500);
                                  
                                } else {
                                  // Legacy format support
                                  if (!confirm('Restore from legacy backup? This will overwrite current data.')) return;
                                  if (data.goals) setGoals(prev => ({ ...prev, ...data.goals }));
                                  if (data.dailyLogs) setDailyLogs(data.dailyLogs);
                                  if (data.wins) setWins(data.wins);
                                  if (data.streaks) setStreaks(data.streaks);
                                  if (data.points) setPoints(data.points);
                                  if (data.level) setLevel(data.level);
                                  if (data.badges) setBadges(data.badges);
                                  if (data.weeklyReviews) setWeeklyReviews(data.weeklyReviews);
                                  if (data.focusGoals) setFocusGoals(data.focusGoals);
                                  if (data.books) setBooks(data.books);
                                  if (data.adventures) setAdventures(data.adventures);
                                  celebrate('✅ Legacy Backup Restored!');
                                }
                              } catch (err) {
                                alert('Error reading backup file. Please make sure it\'s a valid backup.');
                                console.error(err);
                              }
                            };
                            reader.readAsText(file);
                          }
                        }}
                      />
                    </label>
                  </div>
                  
                  <div style={{ marginTop: 12, fontSize: 10, color: 'rgba(255,255,255,0.4)' }}>
                    💡 Tip: Download a backup weekly to protect your progress
                  </div>
                  
                  <div style={{ marginTop: 16, padding: 12, background: 'rgba(255,215,0,0.1)', borderRadius: 6, border: '1px solid rgba(255,215,0,0.2)' }}>
                    <div style={{ fontSize: 11, color: '#FFD700', fontWeight: 600, marginBottom: 4 }}>⚠️ IMPORTANT</div>
                    <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)' }}>Your data is stored in your browser. If you clear browser data, it will be lost. Download a backup regularly!</div>
                  </div>
                </div>
              </>
            )}
          </main>
        </div>
      );
    }

    // ── Fetch Firestore data → write to localStorage → render ──────
    // On first load: pull from Firestore, save to localStorage, then render
    // On subsequent loads (after reload): just render from localStorage
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
